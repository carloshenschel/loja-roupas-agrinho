<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja de Roupas</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f4f4;
}

header{
    background:black;
    color:white;
    text-align:center;
    padding:20px;
}

.produtos{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    padding:20px;
}

.produto{
    background:white;
    width:250px;
    border-radius:10px;
    padding:15px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.produto img{
    width:100%;
    border-radius:10px;
}

button{
    background:black;
    color:white;
    border:none;
    padding:10px 20px;
    cursor:pointer;
    border-radius:5px;
}
</style>

</head>
<body>

<header>
    <h1>Minha Loja de Roupas</h1>
</header>

<div class="produtos">

    <div class="produto">
        <img src="https://via.placeholder.com/250x300" alt="Camiseta">
        <h3>Camiseta Premium</h3>
        <p>R$ 49,90</p>
        <button>Comprar</button>
    </div>

    <div class="produto">
        <img src="https://via.placeholder.com/250x300" alt="Calça">
        <h3>Calça Jeans</h3>
        <p>R$ 89,90</p>
        <button>Comprar</button>
    </div>

</div>

</body>
</html>
